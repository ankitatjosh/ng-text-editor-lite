<div class="demo-shell">

  <header class="demo-header">
    <div class="demo-header__brand">
      <span class="demo-header__logo">✦</span>
      <span class="demo-header__title">@thedevankit/ng-text-editor-lite</span>
      <span class="demo-header__badge">v1.0.0</span>
    </div>
    <div class="demo-header__actions">
      <button class="demo-btn demo-btn--icon" (click)="toggleTheme()" [title]="theme() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'" aria-label="Toggle theme">
        {{ theme() === 'light' ? '🌙' : '☀️' }}
        {{ theme() === 'light' ? 'Dark' : 'Light' }}
      </button>
    </div>
  </header>

  <main class="demo-main">

    <div class="demo-toolbar-bar">
      <div class="demo-toolbar-bar__modes">
        <button class="demo-btn" [class.demo-btn--active]="mode() === 'edit'" (click)="setMode('edit')">Edit</button>
        <button class="demo-btn" [class.demo-btn--active]="mode() === 'readonly'" (click)="setMode('readonly')">Readonly</button>
        <button class="demo-btn" [class.demo-btn--active]="mode() === 'preview'" (click)="setMode('preview')">Preview</button>
        <button class="demo-btn" [class.demo-btn--active]="mode() === 'disabled'" (click)="setMode('disabled')">Disabled</button>
      </div>
      <span class="demo-toolbar-bar__hint">Current mode: <strong>{{ mode() }}</strong></span>
    </div>

    <ng-text-editor-lite
      [content]="html()"
      [mode]="mode()"
      [config]="config()"
      (contentChange)="onChange($event)"
    />

    <details class="demo-output">
      <summary>Raw HTML output</summary>
      <pre>{{ html() }}</pre>
    </details>

  </main>

  <footer class="demo-footer">
    Built by <a href="https://github.com/thedevankit" target="_blank" rel="noopener noreferrer">@thedevankit</a>
    &nbsp;·&nbsp;
    <a href="https://www.npmjs.com/package/@thedevankit/ng-text-editor-lite" target="_blank" rel="noopener noreferrer">npm</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/thedevankit/ng-text-editor-lite" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

</div>
