name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npx ng build ng-text-editor-lite --configuration production

      - name: Test library
        run: npx ng test ng-text-editor-lite --watch=false

      - name: Test demo
        run: npx ng test demo --watch=false

      - name: Lint
        run: npx ng lint ng-text-editor-lite
